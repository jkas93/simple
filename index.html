<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Marketing | Soluciones Digitales y Estrategias para Negocios</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Simple Marketing: Impulsamos el crecimiento de tu negocio con soluciones digitales, diseño web, estrategias de marketing odontológico y automatización 24/7." />
    <meta name="keywords" content="marketing digital, diseño web, marketing odontologico, estrategias digitales, simple marketing, crecimiento de negocios, automatización digital" />
    <meta name="author" content="Simple Marketing" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://simplemkt.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simplemkt.vercel.app/" />
    <meta property="og:title" content="Simple Marketing | Soluciones Digitales y Estrategias para Negocios" />
    <meta property="og:description" content="Creamos sistemas digitales que atraen clientes y automatizan el crecimiento de tu negocio." />
    <meta property="og:image" content="https://simplemkt.vercel.app/assets/images/logo-simple.webp" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://simplemkt.vercel.app/" />
    <meta property="twitter:title" content="Simple Marketing | Estrategias Digitales" />
    <meta property="twitter:description" content="Diseño web y estrategias diseñadas para atraer más clientes 24/7." />
    <meta property="twitter:image" content="https://simplemkt.vercel.app/assets/images/logo-simple.webp" />
    
    <!-- Preconnect to origin and Vercel CDNs if applicable -->
    <link rel="preconnect" href="https://simplemkt.vercel.app" crossorigin />
    
    <!-- LCP Critical Resource: Logo & Hero Illustration -->
    <link rel="preload" as="image" href="/assets/images/logo-simple.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/images/remolino.webp" fetchpriority="high" />

    <!-- Critical Fonts Preload: Preloading the most used weights to reduce layout shift and dependency chain -->
    <link rel="preload" href="/assets/fonts/BricolageGrotesque-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/assets/fonts/BricolageGrotesque-Bold.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/assets/fonts/BricolageGrotesque-ExtraBold.ttf" as="font" type="font/ttf" crossorigin />

    <link rel="icon" type="image/svg+xml" href="/assets/images/logo-simple.webp" />
    <!-- Fuentes locales: BricolageGrotesque cargadas desde index.css -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
